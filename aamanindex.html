<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Aman Kumar! 🎂</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            max-width: 500px;
        }
        
        .name {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5em;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            animation: glow 2s ease-in-out infinite alternate;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }
        
        @keyframes glow {
            from { filter: drop-shadow(0 0 10px rgba(255,107,107,0.5)); }
            to { filter: drop-shadow(0 0 20px rgba(255,107,107,0.8)); }
        }
        
        .birthday-text {
            font-size: 2em;
            color: white;
            margin-bottom: 30px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }
        
        .cake {
            font-size: 4em;
            margin: 20px 0;
            animation: shake 0.5s infinite;
        }
        
        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(2deg); }
            75% { transform: rotate(-2deg); }
        }
        
        .message {
            font-size: 1.2em;
            color: white;
            margin: 20px 0;
            line-height: 1.6;
        }
        
        .fireworks {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .heart {
            position: absolute;
            font-size: 20px;
            color: #ff69b4;
            animation: float 6s infinite linear;
        }
        
        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }
        
        .btn {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="fireworks" id="fireworks"></div>
    
    <div class="container">
        <div class="name">Aman Kumar</div>
        <div class="birthday-text">🎉 Happy Birthday! 🎉</div>
        <div class="cake">🎂🍰🎂</div>
        <p class="message">
            Wishing you a fantastic year ahead filled with joy, success, and endless happiness! 🌟<br>
            May all your dreams come true! ✨
        </p>
        <button class="btn" onclick="createFireworks()">🎆 Celebrate! 🎆</button>
    </div>

    <script>
        // Floating hearts
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '💖';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
            document.body.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 7000);
        }
        
        setInterval(createHeart, 300);
        
        // Fireworks function
        function createFireworks() {
            for(let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const firework = document.createElement('div');
                    firework.style.position = 'absolute';
                    firework.style.left = Math.random() * 100 + 'vw';
                    firework.style.top = Math.random() * 100 + 'vh';
                    firework.style.fontSize = '20px';
                    firework.style.pointerEvents = 'none';
                    firework.innerHTML = ['✨', '🎇', '🎆', '⭐', '💥'][Math.floor(Math.random() * 5)];
                    firework.style.animation = 'float 2s ease-out forwards';
                    document.getElementById('fireworks').appendChild(firework);
                    
                    setTimeout(() => firework.remove(), 2000);
                }, i * 50);
            }
        }
        
        // Auto fireworks on load
        window.onload = () => {
            setTimeout(createFireworks, 1000);
        };
    </script>
</body>
</html>
